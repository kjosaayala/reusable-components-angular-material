<main class="main">
  <h1>Reusable Components with Angular Material</h1>
</main>

<mat-accordion class="example-headers-align" multi>
  <mat-expansion-panel>
    <mat-expansion-panel-header>
      <mat-panel-title> Reusable Grid </mat-panel-title>
      <mat-panel-description>
        To render a table with almost any type of data
      </mat-panel-description>
    </mat-expansion-panel-header>
    <div>
      <button matButton="filled" (click)="onClickLoadData()">Cargar datos</button>
      <app-reusable-grid [gridData]="reusableGridSample"></app-reusable-grid>
    </div>
  </mat-expansion-panel>
  <mat-expansion-panel>
    <mat-expansion-panel-header>
      <mat-panel-title> Reusable Card </mat-panel-title>
      <mat-panel-description>
        To render a specific design of a card with/without actions
      </mat-panel-description>
    </mat-expansion-panel-header>
    <div>
      <p>Coming soon...</p>
    </div>
  </mat-expansion-panel>
</mat-accordion>

<router-outlet />
